name: DevSecOps Pipeline - Books-Pens (Production)

# ═══════════════════════════════════════════════════════════════════
# PRODUCTION LEVEL PIPELINE
# - ALL secrets from AWS Secrets Manager (ZERO hardcoding)
# - OIDC authentication (no static keys)
# - SonarQube running on bastion server
# - 10 stages, fully automated
#
# TRIGGERS:
#   - PR to master    → Runs scan stages (1-6) only, no deploy
#   - Manual dispatch → Runs full pipeline including deploy
#   - Push to master  → Does NOT trigger (you deploy manually)
# ═══════════════════════════════════════════════════════════════════

on:
  push:
    branches: [master]
    paths-ignore:
      - "terraform/**"
      - "*.md"
      - ".github/dependabot.yml"
  pull_request:
    branches: [master]
    paths-ignore:
      - "terraform/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      action:
        description: "What do you want to do?"
        required: true
        default: "scan-only"
        type: choice
        options:
          - scan-only
          - deploy

env:
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  ECR_REPOSITORY_NAME: books-pens
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/books-pens
  EKS_CLUSTER_NAME: books-cluster
  IMAGE_TAG: v${{ github.run_number }}


permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: write

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # STAGE 1: SECRET SCANNING 
  # ═══════════════════════════════════════════════════════════════════
  secret-scan:
    name: "Stage 1: Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ═══════════════════════════════════════════════════════════════════
# STAGE 3: DEPENDENCY SCAN — SCA
# ═══════════════════════════════════════════════════════════════════
  dependency-scan:
    name: "Stage 3: Dependency Scan (Trivy FS)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy Filesystem Scan - src
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "./src"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

# ═══════════════════════════════════════════════════════════════════
# STAGE 4: DOCKER BUILD & PUSH IMAGE
# ═══════════════════════════════════════════════════════════════════

  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Save Docker image
        run: docker save -o books-pens.tar ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: books-pens.tar

  # ═══════════════════════════════════════════════════════════════════
  # STAGE 5: CONTAINER IMAGE SCAN 
  # ═══════════════════════════════════════════════════════════════════
  image-scan:
    name: "Stage 5: Container Image Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: [build-and-push]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images
        run: |
          docker load -i books-pens.tar

      - name: Scan Books-pens Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ github.sha }}"
          format: "sarif"
          output: "trivy-image.sarif"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          scanners: "vuln"
          trivyignores: ".trivyignore"

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-image.sarif"
          category: "trivy-image"
