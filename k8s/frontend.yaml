apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: books-pens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: books-pens-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: books-pens
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
