apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: books-pens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: books-pens-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: books-pens
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
