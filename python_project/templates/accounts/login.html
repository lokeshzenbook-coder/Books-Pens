{% extends 'base.html' %}

{% block title %}Ink & Paper | Log In{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card bg-white p-4 p-md-5 card-custom border-light shadow-xs font-sans text-xs">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-dark h3 mb-1">Welcome Back</h2>
                    <p class="text-muted">Sign in to your analog writer credentials</p>
                </div>

                <form method="POST" action="">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label text-muted">Username</label>
                        {{ form.username }}
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted">Password</label>
                        {{ form.password }}
                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-3 fw-bold mb-3" style="font-size: 13.5px;">Sign In</button>
                    
                    <p class="text-muted text-center mb-0" style="font-size: 12.5px;">
                        New to Ink & Paper? <a href="{% url 'accounts:signup' %}" class="text-decoration-none fw-bold text-dark">Register Account</a>
                    </p>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
